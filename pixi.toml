[workspace]
authors = ["Marc Shen <marcshen@163.com>"]
channels = ["conda-forge"]
name = "data_system"
platforms = ["osx-arm64", "osx-64", "win-64"]
version = "0.1.0"

[tasks]

[dependencies]
python = "3.12.*"
pandas = ">=2.3.2,<3"
# numpy = ">=2.3.3,<3"
jupyter = ">=1.1.1,<2"
ipython = ">=9.5.0,<10"
ipykernel = ">=6.30.1,<7"
matplotlib = ">=3.10.6,<4"
xlrd = ">=2.0.2,<3"
openpyxl = ">=3.1.5,<4"
pypinyin = ">=0.55.0,<0.56"
adjusttext = ">=1.3.0,<2"
pandoc = ">=3.9,<4"


[pypi-dependencies]
PySimpleGUI = {path = "PySimpleGUI-4.60.5-py3-none-any.whl"}

[feature.paper.dependencies]
bs4 = ">=4.13.5,<5"
selenium = ">=4.35.0,<5"

[feature.release.dependencies]
python = "3.12.*"
pandas = ">=2.3.2,<3"
matplotlib = ">=3.10.6,<4"
xlrd = ">=2.0.2,<3"
openpyxl = ">=3.1.5,<4"
pypinyin = ">=0.55.0,<0.56"
pyinstaller = ">=6.15.0,<7"
pandoc = ">=3.9,<4"

[feature.release.pypi-dependencies]
PySimpleGUI = {path = "PySimpleGUI-4.60.5-py3-none-any.whl"}

[environments]
default = ["default"]
all = ["default", "paper", "release"]
paper = ["default","paper"]
release = ["release"]
